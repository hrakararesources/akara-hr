name: Task Assigned Email

on:
  schedule:
    # ทุก 15 นาที (GitHub cron อาจดีเลย์ได้บ้าง)
    - cron: '*/15 * * * *'
  workflow_dispatch: # รันมือได้สำหรับทดสอบ

jobs:
  notify-assign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Send assignment emails
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          GRAPH_SENDER: ${{ secrets.GRAPH_SENDER }}
        run: node notify-assign.js
