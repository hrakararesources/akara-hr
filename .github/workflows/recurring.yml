name: Generate Recurring Monthly Tasks

on:
  schedule:
    # รันทุกวัน 07:30 น. (UTC+7 = 00:30 UTC) — เช็ค last_period กันสร้างซ้ำ สร้างครั้งเดียวต่อเดือน
    - cron: '30 0 * * *'
  workflow_dispatch: # รันมือได้สำหรับทดสอบ

jobs:
  recurring:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate recurring tasks
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node recurring.js
